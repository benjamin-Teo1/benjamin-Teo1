name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *" # se ejecuta todos los días a medianoche
  workflow_dispatch: # permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          username: benjamin-Teo1

      - name: Commit & push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -f ./profile-3d-contrib/*.svg
          git commit -m "generate 3D contribution graph" || exit 0
          git push
